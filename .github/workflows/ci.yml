name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gamex
          POSTGRES_PASSWORD: gamex_ci_password
          POSTGRES_DB: gamex_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamex -d gamex_pos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://gamex:gamex_ci_password@localhost:5432/gamex_pos?schema=public
      SESSION_SECRET: CIOnlySessionKey!RotateForRealUse123
      MANAGER_DISCOUNT_LIMIT_PERCENT: "10"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run db:deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
