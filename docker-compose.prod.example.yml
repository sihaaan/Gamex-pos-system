services:
  web:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      MANAGER_DISCOUNT_LIMIT_PERCENT: ${MANAGER_DISCOUNT_LIMIT_PERCENT:-10}
      SESSION_IDLE_TIMEOUT_MS: ${SESSION_IDLE_TIMEOUT_MS:-28800000}
      SESSION_ABSOLUTE_TIMEOUT_MS: ${SESSION_ABSOLUTE_TIMEOUT_MS:-1209600000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
